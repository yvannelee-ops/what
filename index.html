<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天氣預報應用</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌤 天氣預報</h1>
      <p>即時天氣資訊</p>
    </header>

    <section class="search-section">
      <div class="search-box">
        <input type="text" id="cityInput" placeholder="輸入城市名稱（例如：台北、東京、紐約）" />
        <button id="searchBtn">搜尋</button>
      </div>
    </section>

    <section class="weather-info" id="weatherInfo">
      <div class="weather-card">
        <div class="weather-header">
          <h2 id="cityName">-</h2>
          <span id="country">-</span>
        </div>
        <div class="weather-main">
          <img id="weatherIcon" src="" alt="天氣圖示" />
          <div class="temperature">
            <span id="temp">--</span><span class="unit">°C</span>
          </div>
          <p id="weatherDescription">--</p>
        </div>
        <div class="weather-details">
          <div class="detail">
            <span class="label">體感溫度</span>
            <span id="feelsLike">--</span><span class="unit">°C</span>
          </div>
          <div class="detail">
            <span class="label">濕度</span>
            <span id="humidity">--</span><span class="unit">%</span>
          </div>
          <div class="detail">
            <span class="label">風速</span>
            <span id="windSpeed">--</span><span class="unit">m/s</span>
          </div>
          <div class="detail">
            <span class="label">氣壓</span>
            <span id="pressure">--</span><span class="unit">hPa</span>
          </div>
        </div>
      </div>
    </section>

    <section class="forecast-section" id="forecastSection" style="display: none;">
      <h2>5 天天氣預報</h2>
      <div class="forecast-container" id="forecastContainer"></div>
    </section>

    <footer>
      <p>資料來源：OpenWeatherMap</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
